version: v1.0
name: Demo CI pipeline
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2404
blocks:
  - name: Build and Push Docker Image
    task:
      secrets:
        - name: DOCKER_FILIP
      prologue:
        commands:
          - checkout
      jobs:
        - name: Docker Build and Push
          commands:
            - echo "$DOCKER_PASSWORD_FILIP" | docker login -u "$DOCKER_USERNAME_FILIP" --password-stdin
            - 'docker pull "$DOCKER_USERNAME_FILIP/my-flask-app:latest" || true'
            - 'docker build --cache-from "$DOCKER_USERNAME_FILIP/my-flask-app:latest" -t "$DOCKER_USERNAME_FILIP/my-flask-app:$SEMAPHORE_GIT_SHA" -t "$DOCKER_USERNAME_FILIP/my-flask-app:latest" 7-pipeline/'
            - 'docker push "$DOCKER_USERNAME_FILIP/my-flask-app:$SEMAPHORE_GIT_SHA"'
            - 'docker push "$DOCKER_USERNAME_FILIP/my-flask-app:latest"'
