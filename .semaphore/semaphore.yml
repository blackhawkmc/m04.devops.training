version: v1.0
name: Demo CI pipeline
agent:
  machine:
    type: s1-ubuntu
    os_image: ubuntu2004

blocks:
  - name: Build and Push Docker Image
    task:
      secrets:
        - name: DOCKER_USERNAME_FILIP
        - name: DOCKER_PASSWORD_FILIP
      prologue:
        commands:
          - checkout
      jobs:
        - name: Docker Build and Push
          commands:
            # Login to Docker Hub securely (avoids password in process list)
            - echo "$DOCKER_PASSWORD_FILIP" | docker login -u "$DOCKER_USERNAME_FILIP" --password-stdin
            # Pull latest image to use as cache (|| true so it doesn't fail on first run)
            - docker pull "$DOCKER_USERNAME_FILIP/my-flask-app:latest" || true
            # Build with layer cache, tag with both git SHA (unique) and latest
            - docker build
                --cache-from "$DOCKER_USERNAME_FILIP/my-flask-app:latest"
                -t "$DOCKER_USERNAME_FILIP/my-flask-app:$SEMAPHORE_GIT_SHA"
                -t "$DOCKER_USERNAME_FILIP/my-flask-app:latest"
                7-pipeline/
            - docker push "$DOCKER_USERNAME_FILIP/my-flask-app:$SEMAPHORE_GIT_SHA"
            - docker push "$DOCKER_USERNAME_FILIP/my-flask-app:latest"

